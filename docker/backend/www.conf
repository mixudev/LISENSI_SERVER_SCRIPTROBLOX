[www]
user = www-data
group = www-data
listen = 9000
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

catch_workers_output = yes
decorate_workers_output = no

; Hindari /proc/self/fd/2 — bisa permission denied tergantung
; bagaimana stderr container di-attach (TTY vs pipe vs non-interaktif).
; Tulis ke file biasa yang sudah dimiliki www-data.
php_admin_value[error_log] = /var/www/html/storage/logs/fpm-error.log
php_admin_flag[log_errors] = on