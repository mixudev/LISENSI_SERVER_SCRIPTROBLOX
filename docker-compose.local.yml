# =============================================================================
# Local development overrides
# Digunakan otomatis oleh setup.sh dan start.sh
# =============================================================================

services:
  backend:
    build:
      target: development
    environment:
      RUN_MIGRATIONS: "true"

  queue:
    environment:
      RUN_MIGRATIONS: "false"

  # ─── ngrok tunnel (local dev — Roblox testing) ───────────────────────────────
  # CATATAN: ngrok container Docker TIDAK dipakai karena custom domain
  # unfertile-proconsularly-dorris.ngrok-free.dev harus dijalankan manual:
  #   ngrok http --url=unfertile-proconsularly-dorris.ngrok-free.dev 8000
  #
  # Container ini tetap ada untuk fallback jika ingin pakai URL random.
  ngrok:
    image: ngrok/ngrok:latest
    container_name: sl-ngrok
    restart: "no"
    command: http nginx:80
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "${NGROK_UI_PORT:-4040}:4040"
    depends_on:
      nginx:
        condition: service_started
    networks:
      - sl-network
    profiles:
      - ngrok
