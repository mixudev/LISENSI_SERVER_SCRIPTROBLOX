# =============================================================================
# SCRIPT_LISENSI — Docker Compose (Base)
# Jalankan dengan: docker compose up -d
# Local dev + ngrok: ./start.sh
# =============================================================================

name: script-lisensi

services:
  # ─── Database ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sl-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - sl-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Redis (opsional — aktifkan dengan: --profile with-redis) ─────────────
  redis:
    profiles: ["with-redis"]
    image: redis:7-alpine
    container_name: sl-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - sl-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Laravel Backend (PHP-FPM) ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: ${BACKEND_BUILD_TARGET:-production}
    image: script-lisensi-backend:latest
    container_name: sl-backend
    restart: unless-stopped
    env_file:
      - Backend/.env
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      WAIT_FOR_DB: ${WAIT_FOR_DB:-true}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    volumes:
      - ./Backend/storage:/var/www/html/storage
      - ./Backend/.env:/var/www/html/.env
      - ./Backend/public/build:/var/www/html/public/build
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - sl-network

  # ─── Laravel Queue Worker ───────────────────────────────────────────────────
  queue:
    image: script-lisensi-backend:latest
    container_name: sl-queue
    restart: unless-stopped
    env_file:
      - Backend/.env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      WAIT_FOR_DB: "true"
      RUN_MIGRATIONS: "false"
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90 --no-interaction
    volumes:
      - ./Backend/storage:/var/www/html/storage
      - ./Backend/.env:/var/www/html/.env
    depends_on:
      backend:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - sl-network

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sl-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./Backend/public:/var/www/html/public:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./Backend/public/build:/var/www/html/public/build:ro
    depends_on:
      - backend
    networks:
      - sl-network

  # ─── Discord Bot (Node.js) ─────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    image: script-lisensi-bot:latest
    container_name: sl-bot
    restart: unless-stopped
    env_file:
      - Bot_Server/.env
    environment:
      WAIT_FOR_LARAVEL: ${WAIT_FOR_LARAVEL:-true}
    depends_on:
      backend:
        condition: service_healthy
      nginx:
        condition: service_started
    networks:
      - sl-network

networks:
  sl-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  public_build:
    driver: local
